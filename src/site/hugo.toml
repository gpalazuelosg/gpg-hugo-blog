# Site config — PRD Appendix A, implementation-plan §2
# CI overrides baseURL per gate (see .github/workflows/ci.yml)
baseURL = "https://palazuelos.dev/"
locale = "en-us"
title = "Gerardo Palazuelos"
theme = "PaperMod"

# robots.txt is shipped statically from static/robots.txt (PRD §4.3)
enableRobotsTXT = false

# Iteration 1 (PRD §6, plan task 2.2): tags + categories enabled.
# MVP had disableKinds = ["taxonomy", "term"] per the old A5/D4 anti-goals,
# amended by the iteration-1 plan.
[taxonomies]
tag = "tags"
category = "categories"

[pagination]
pagerSize = 10

[params]
author = "Gerardo Palazuelos"
description = "Technical blog on software engineering"
defaultTheme = "auto"
ShowCodeCopyButtons = true
# Enabled in Iteration 1 (plan task 3.2)
ShowReadingTime = true
# Not in any planned iteration — enable deliberately if ever wanted
ShowShareButtons = false

[params.homeInfoParams]
Title = "Gerardo Palazuelos"
Content = "Notes on software engineering — system design, backend patterns, and lessons learned building production systems."

[params.footer]
# Rendered by PaperMod's default footer partial between copyright and the
# Powered-by line — Markdown links keep the override footprint at zero
# (PRD §4.5 / acceptance A4, E9).
text = "[Privacy](/privacy/) · [Affiliate disclosure](/disclosure/)"

[[params.socialIcons]]
name = "github"
url = "https://github.com/gpalazuelosg"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[menus]
[[menus.main]]
name = "Blog"
url = "/blog/"
weight = 10

[[menus.main]]
name = "Search"
url = "/search/"
weight = 20

# Related posts (iteration-1-plan task 3.2): tags dominate, categories help,
# date is the fallback so an untagged post still gets suggestions. Threshold
# kept low deliberately — on a small site "something related" beats nothing.
[related]
includeNewer = true
threshold = 20
toLower = true

[[related.indices]]
name = "tags"
weight = 100

[[related.indices]]
name = "categories"
weight = 60

[[related.indices]]
name = "date"
weight = 10

[markup.highlight]
noClasses = false
codeFences = true

[markup.goldmark.renderer]
# Content from the Sanity pipeline (task 3.1) arrives as raw HTML blocks
unsafe = true

# Home outputs: HTML + RSS + JSON (the Fuse.js search index, PRD §1
# decision 17). Do NOT add "sitemap" here — that renders /sitemap.xml as a
# *home-page* output listing only the home page's direct children, silently
# dropping posts (broke acceptance E6). Hugo emits the site-wide sitemap by
# default as its own page kind.
[outputs]
home = ["HTML", "RSS", "JSON"]

[security.funcs]
# Hugo's default only whitelists ^HUGO_ and ^CI$. extend_head.html reads
# VERCEL_ENV to emit the analytics script on production deploys only
# (PRD §1 decision 15).
getenv = ["^HUGO_", "^CI$", "^VERCEL_ENV$"]
