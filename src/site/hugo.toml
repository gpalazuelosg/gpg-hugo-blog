# Site config — PRD Appendix A, implementation-plan §2
# CI overrides baseURL per gate (see .github/workflows/ci.yml)
baseURL = "https://palazuelos.dev/"
locale = "en-us"
title = "Gerardo Palazuelos"
theme = "PaperMod"

# robots.txt is shipped statically from static/robots.txt (PRD §4.3)
enableRobotsTXT = false

# No categories/tags in MVP (PRD §2.3 deferred fields, acceptance A5/D4);
# also stops Hugo emitting empty /tags/ and /categories/ pages
disableKinds = ["taxonomy", "term"]

[pagination]
pagerSize = 10

[params]
author = "Gerardo Palazuelos"
description = "Technical blog on software engineering"
defaultTheme = "auto"
ShowCodeCopyButtons = true
# Deferred to Iteration 1 per PRD §6 — do not enable for MVP
ShowReadingTime = false
ShowShareButtons = false

[params.homeInfoParams]
Title = "Gerardo Palazuelos"
Content = "Notes on software engineering — system design, backend patterns, and lessons learned building production systems."

[params.footer]
# Rendered by PaperMod's default footer partial between copyright and the
# Powered-by line — Markdown links keep the override footprint at zero
# (PRD §4.5 / acceptance A4, E9).
text = "[Privacy](/privacy/) · [Affiliate disclosure](/disclosure/)"

[[params.socialIcons]]
name = "github"
url = "https://github.com/gpalazuelosg"

[[params.socialIcons]]
name = "rss"
url = "/index.xml"

[menus]
[[menus.main]]
name = "Blog"
url = "/blog/"
weight = 10

[markup.highlight]
noClasses = false
codeFences = true

[markup.goldmark.renderer]
# Content from the Sanity pipeline (task 3.1) arrives as raw HTML blocks
unsafe = true

[outputs]
home = ["HTML", "RSS", "sitemap"]
